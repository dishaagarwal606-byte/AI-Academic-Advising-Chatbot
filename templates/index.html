<!DOCTYPE html>
<html>
<head>
<title>AI Academic Chatbot</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 400px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
}

.header {
    background: #4a6cf7;
    color: white;
    padding: 15px;
    border-radius: 12px 12px 0 0;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

.chat-box {
    height: 400px;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 75%;
    font-size: 14px;
}

.user {
    background: #4a6cf7;
    color: white;
    align-self: flex-end;
}

.bot {
    background: #e5e7eb;
    align-self: flex-start;
}

.typing {
    font-style: italic;
    color: gray;
}

.input-area {
    display: flex;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    background: #4a6cf7;
    color: white;
    border: none;
    padding: 12px 15px;
    cursor: pointer;
}

button:hover {
    background: #3b5de0;
}
</style>

</head>

<body>

<div class="chat-container">
    <div class="header">🎓 Academic Chatbot</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input id="msg" placeholder="Ask about courses, policies...">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
let chatBox = document.getElementById("chatBox");

// Welcome message
addMessage("Hello! 👋 I am your academic advisor chatbot. How can I help you today?", "bot");

// Add message function
function addMessage(text, type) {
    let msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Send message
function send() {
    let input = document.getElementById("msg");
    let message = input.value;

    if(message.trim() === "") return;

    addMessage(message, "user");
    input.value = "";

    // Typing indicator
    let typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.innerText = "Typing...";
    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        chatBox.removeChild(typing);
        addMessage(data.reply, "bot");
    })
    .catch(() => {
        chatBox.removeChild(typing);
        addMessage("Error connecting to server", "bot");
    });
}

// Enter key support
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
